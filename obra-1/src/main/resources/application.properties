spring.application.name=obra-1
server.port=9090

# ---------------- Configuração de banco ----------------
spring.datasource.url=jdbc:postgresql://localhost:5432/pizzastock
spring.datasource.username=postgres
spring.datasource.password=3108

# ---------------- JPA / Hibernate ----------------

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jackson.serialization.fail-on-empty-beans=false

# ---------------- JWT ----------------
jwt.secret=TroquePorUmaChave256bitsSeguraAqui1234567890123456

# 86400 segundos = 24h
jwt.expiration=86400

# ---------------- Logging SQL (opcional) ----------------
logging.level.org.hibernate.SQL=debug

#----------------- Config de Email --------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=email
spring.mail.password=senha-email
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
